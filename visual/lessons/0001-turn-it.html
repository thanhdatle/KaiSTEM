      blocks: [
        { tone: "", label: "Turned vs. flipped",
          html: "<strong>Turn</strong> a shape and it is still the same shape. <strong>Flip</strong> it — mirror it — and it becomes a <em>different</em> shape that looks maddeningly similar. That is the difference between <strong>b</strong> and <strong>d</strong>, and between a left shoe and a right shoe. Noticing it is the engine of spatial reasoning, and later, of reading letters. Every card in the deck asks this one question." },

      doText: "<strong>Warm-up (~5 min).</strong> Give him both shapes. Let him stack them, match them, discover they are twins. Say it out loud: <em>“They're the same shape.”</em><br><br><strong>Main (~15 min).</strong> Lay one shape down and leave it there. Turn the other one a little. Ask: <em>“Is it still the same shape?”</em> Let him pick it up, turn it back, and check. Again — turn it further. Then a quarter turn. Then upside-down. Every round he verifies by physically turning it back. Five, six, ten rounds. He will not get bored of being right.<br><br><strong>Stretch it further (~10 min).</strong> Now <em>he</em> turns it and asks <em>you</em>. Be wrong sometimes, on purpose, and let him correct you — being the one who knows is the best part of his day. Finish by turning a shape behind your back and asking him to guess how it will look before you reveal it.",

      doText: "<strong>Warm-up (~5 min).</strong> Two minutes of yesterday's foam-shape game, so the move is fresh in his fingers.<br><br><strong>Main (~15 min).</strong> Card 1. Point at the shape on the left: <em>“Here's our shape.”</em> Point right: <em>“One of these two is the same shape, just turned. One is a trick. Which is which?”</em> He points. Whatever he says, ask <strong>“how do you know?”</strong> before you react either way. Then reveal. Six cards, unhurried.<br><br><strong>Stretch it further (~10 min).</strong> When a card is hard, hand him the foam twin and let him <em>physically</em> turn it onto the answer. Then go back and re-ask the card. Watching a hard one become easy is the whole feeling we are building. Finish by letting him choose his favourite card to do once more.",

        { icon: "⚠️", text: "He always picks the left one, or always the right. He is pattern-matching your layout, not the shape. Rotate the card 180° between trials and that strategy dies." },

      setup: "Cards 7–12, the hard turns, plus the mirror and the two foam shapes.",
      doText: "<strong>Warm-up (~5 min).</strong> The mirror first, before any card. Stand a foam shape against the mirror. <em>“Look — the mirror one is not the same. It's flipped.”</em> Let him hold his own hand up to it. Then compare his two hands: same shape? No — <strong>flipped</strong>. Left hand, right hand. This may be the best three minutes of the whole lesson.<br><br><strong>Main (~15 min).</strong> Now the hard cards, with the new word in hand. The question grows one clause: <em>“Which is the same shape just turned — and which one is flipped?”</em> He now has to reject the decoy for a <em>reason</em>, not a feeling. Six cards.<br><br><strong>Stretch it further (~10 min).</strong> Hunt the house for flipped things: his two shoes, two hands, two ears, the letters <strong>b</strong> and <strong>d</strong> in a book. Then flip a foam shape and ask him to turn it back to matching. He can't — and discovering that he <em>can't</em> is the lesson landing.",

      { q: "Should I flash the cards fast, the way Shichida did?", a: "No — and this is the one place I'd ask you to trust the evidence over the sales pitch. The speed was never the mechanism. A randomised trial of a fast-flash infant programme found <strong>no effect on 13 of 14 measures</strong>. What was working in those sessions was you: your voice, your attention, your questions. <a href=\"../reference/0002-visual-thinking-evidence.html\">The evidence card lays it out honestly</a>, including what Shichida gets right." },

      { q: "Four days feels short. What if he wants more?", a: "Then he has told you where to go next. The deck has twelve cards, the shapes are chiral, and you can re-angle them forever. Better still, ask me for the next lesson — pattern play and symmetry both build on this one, and both are places where your AI image generation genuinely earns its keep." },
      { q: "He got everything right on Day 1.", a: "Then he is ahead of where I pitched this, and I need to know. Tell me, and I'll rebuild the deck at 135° and 180° only, add a third choice, and move him toward composing shapes rather than matching them." }

    trials: [
      { shape: "ell",  angle: 45  },
      { shape: "flag", angle: 45  },
      { shape: "boot", angle: 45  },
      { shape: "ess",  angle: 90  },
      { shape: "ell",  angle: 90  },
      { shape: "flag", angle: 90  },
      { shape: "boot", angle: 135 },
      { shape: "ess",  angle: 135 },
      { shape: "ell",  angle: 135 },
      { shape: "flag", angle: 180 },
      { shape: "boot", angle: 180 },
      { shape: "ess",  angle: 180 }
    ]
  });
